syntax = "proto3";

option java_multiple_files = true;
option java_package = "proto";
option java_outer_classname = "TaskProto";

service TaskService {
  rpc SubmitTask(TaskRequest) returns (TaskResponse);
}

message TaskRequest {
  string taskId = 1;
  string payload = 2;
}

message TaskResponse {
  string status = 1;
  string result = 2;
}